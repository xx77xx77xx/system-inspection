<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>系统巡检 - 登录</title>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 48px 40px;
            width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .login-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .login-header h2 {
            color: #303133;
            font-size: 22px;
            font-weight: 600;
        }

        .login-header p {
            color: #909399;
            font-size: 13px;
            margin-top: 8px;
        }

        .login-btn {
            width: 100%;
            height: 44px;
            font-size: 16px;
            border-radius: 8px;
        }
    </style>
</head>

<body>
    <div id="app">
        <div class="login-card">
            <div class="login-header">
                <h2>系统巡检控制台</h2>
                <p>请输入管理员账号登录</p>
            </div>
            <el-form @submit.prevent="doLogin">
                <el-form-item>
                    <el-input v-model="username" placeholder="用户名" prefix-icon="User" size="large" clearable></el-input>
                </el-form-item>
                <el-form-item>
                    <el-input v-model="password" placeholder="密码" prefix-icon="Lock" size="large" type="password"
                        show-password @keyup.enter="doLogin"></el-input>
                </el-form-item>
                <el-form-item>
                    <el-button class="login-btn" type="primary" size="large" @click="doLogin" :loading="loading">登
                        录</el-button>
                </el-form-item>
            </el-form>
        </div>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/element-plus"></script>
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>

    <script>
        const { createApp, ref } = Vue;

        const app = createApp({
            setup() {
                const username = ref('');
                const password = ref('');
                const loading = ref(false);

                const doLogin = () => {
                    if (!username.value || !password.value) {
                        ElementPlus.ElMessage.warning('请输入用户名和密码');
                        return;
                    }

                    loading.value = true;
                    axios.post('/api/login', {
                        username: username.value,
                        password: password.value
                    }).then(res => {
                        if (res.data.code === 200) {
                            ElementPlus.ElMessage.success('登录成功，正在跳转...');
                            setTimeout(() => { window.location.href = '/'; }, 500);
                        } else {
                            ElementPlus.ElMessage.error(res.data.msg || '登录失败');
                        }
                    }).catch(() => {
                        ElementPlus.ElMessage.error('网络错误');
                    }).finally(() => {
                        loading.value = false;
                    });
                };

                return { username, password, loading, doLogin };
            }
        });

        app.use(ElementPlus);
        app.mount('#app');
    </script>
</body>

</html>
